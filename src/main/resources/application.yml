spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
  application:
    name: theater-ticketing-system

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

theater:
  voucher:
    pending-claim-ttl-seconds: 300
    lock-ttl-seconds: 10

jwt:
  secret: ${JWT_SECRET:theaterTicketingSystemSecretKeyForJWTSigningMustBe256BitsLong!}
  expiration: 86400000
